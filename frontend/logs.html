<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Logs</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="js/auth.js"></script>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>SECURE CCTV</h2>
        <p class="sidebar-subtitle">MONITORING</p>

        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="cameras.html">Cameras</a></li>

            <li class="admin-only">
                <a class="active" href="logs.html">Logs</a>
            </li>

            <li class="admin-only">
                <a href="admin.html">Users</a>
            </li>

            <li><a href="settings.html">Settings</a></li>

            <li>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </li>
        </ul>
    </aside>

    <main class="main-content">

        <div class="page-header">
            <h1>Audit Logs</h1>

        </div>

        <section class="logs-card">

            <div class="logs-toolbar">

                <div class="logs-search">
                    <input type="text" id="searchUsername" placeholder="Search username...">
                    <input type="text" id="searchAction" placeholder="Search action...">

                    <button id="searchBtn">
                        Search
                    </button>

                    <button id="clearSearchBtn" class="secondary-btn">
                        Clear
                    </button>
                </div>

                <button id="exportLogs" class="export-btn">
                    Export CSV
                </button>

            </div>

            <div class="logs-table-wrapper">

                <table class="logs-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Action</th>
                            <th>IP Address</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>

                    <tbody id="logsTable">
                        <tr>
                            <td colspan="4">Loading logs...</td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </section>

    </main>

</div>

<script src="js/auth.js"></script>
<script src="js/logs.js"></script>

</body>
</html>
